services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: spendlens
      POSTGRES_PASSWORD: spendlens
      POSTGRES_DB: spendlens
    ports:
      # Host port 5433 to avoid clashing with a host-installed Postgres.
      # Containers still talk to Postgres on 5432 via the compose network.
      - "127.0.0.1:5433:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U spendlens -d spendlens"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      # Host port 6380 to avoid clashing with a host-installed Redis.
      - "127.0.0.1:6380:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-spendlens}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:-spendlens-secret}
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 3s
      retries: 5

  minio-bootstrap:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 $${S3_ACCESS_KEY} $${S3_SECRET_KEY};
      mc mb --ignore-existing local/$${S3_BUCKET};
      exit 0;
      "
    environment:
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-spendlens}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-spendlens-secret}
      S3_BUCKET: ${S3_BUCKET:-receipts}

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    env_file:
      - .env
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - ./backend:/app
    restart: unless-stopped

volumes:
  pg_data:
  redis_data:
  minio_data:
