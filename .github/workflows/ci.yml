name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: backend (lint + test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: spendlens
          POSTGRES_PASSWORD: spendlens
          POSTGRES_DB: spendlens_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U spendlens -d spendlens_test"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    env:
      ENVIRONMENT: test
      DATABASE_URL: postgresql+asyncpg://spendlens:spendlens@localhost:5432/spendlens_test
      REDIS_URL: redis://localhost:6379/1
      JWT_SECRET: ci-secret-must-be-at-least-32-characters-long
      S3_ACCESS_KEY: ci-access-key
      S3_SECRET_KEY: ci-secret-key-longer-than-the-minio-minimum
      S3_ENDPOINT_URL: http://localhost:9000
      S3_BUCKET: receipts

    steps:
      - uses: actions/checkout@v4

      # MinIO lives outside the ``services:`` block because GitHub
      # Actions services can't override a container's command, and the
      # official minio/minio image requires ``server /data`` to start.
      # ``docker run`` lets us set that plus pre-create the bucket.
      - name: Start MinIO
        shell: bash
        run: |
          docker run -d --name minio \
            -p 9000:9000 \
            -e MINIO_ROOT_USER="${S3_ACCESS_KEY}" \
            -e MINIO_ROOT_PASSWORD="${S3_SECRET_KEY}" \
            minio/minio:latest server /data
          for _ in $(seq 1 30); do
            if curl -fsS http://localhost:9000/minio/health/live >/dev/null; then
              echo "MinIO is up"
              break
            fi
            sleep 1
          done
          docker run --rm --network host \
            -e S3_ACCESS_KEY="${S3_ACCESS_KEY}" \
            -e S3_SECRET_KEY="${S3_SECRET_KEY}" \
            -e S3_BUCKET="${S3_BUCKET}" \
            --entrypoint /bin/sh \
            minio/mc:latest -c '
              mc alias set local http://localhost:9000 "$S3_ACCESS_KEY" "$S3_SECRET_KEY" &&
              mc mb --ignore-existing local/"$S3_BUCKET"
            '

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/pyproject.toml

      # OS-level OCR / rasterisation deps the pipeline shells out to:
      # * tesseract-ocr  — pytesseract binding requires the binary
      # * poppler-utils  — pdf2image rasterises PDF receipts via pdftoppm
      # The Dockerfile installs the same packages; dev / CI / prod
      # track one version stream.
      - name: Install OCR tooling
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends tesseract-ocr poppler-utils

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint with ruff
        run: ruff check .

      - name: Format check
        run: ruff format --check .

      - name: Type check with mypy
        run: mypy app

      - name: Run migrations
        run: alembic upgrade head

      - name: Run tests
        run: pytest --cov=app --cov-report=term-missing

  frontend:
    name: frontend (lint + test + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      # ``npm ci`` is the right call in CI: it reads the lockfile,
      # installs exact versions, and fails fast on drift between
      # ``package.json`` and the lockfile (which would otherwise
      # silently produce non-reproducible builds).
      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

      - name: Type check
        run: npm run typecheck

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build
