name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: backend (lint + test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: spendlens
          POSTGRES_PASSWORD: spendlens
          POSTGRES_DB: spendlens_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U spendlens -d spendlens_test"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    env:
      ENVIRONMENT: test
      DATABASE_URL: postgresql+asyncpg://spendlens:spendlens@localhost:5432/spendlens_test
      REDIS_URL: redis://localhost:6379/1
      JWT_SECRET: ci-secret-must-be-at-least-32-characters-long
      S3_ACCESS_KEY: test
      S3_SECRET_KEY: test-secret

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint with ruff
        run: ruff check .

      - name: Format check
        run: ruff format --check .

      - name: Type check with mypy
        run: mypy app

      - name: Run migrations
        run: alembic upgrade head

      - name: Run tests
        run: pytest --cov=app --cov-report=term-missing
